# Supabase project config. Generated for Phase 2 Edge Functions.
project_id = "cridgriesmapykmeqmuo"

# parse-intent is called server-to-server (by channel webhooks, and by you for
# tuning). It does not require an end-user JWT. It still needs its own secrets
# (ANTHROPIC_API_KEY) set via `supabase secrets set`.
[functions.parse-intent]
verify_jwt = false

# square-availability: read-only slot computation. verify_jwt=false for now so
# it's testable before the app exists; tighten to true once the app sends a
# user session (it returns only the stylist's own availability, no secrets).
[functions.square-availability]
verify_jwt = false

# square-create-booking: the ONLY Square write path. Requires an authenticated
# stylist session — never callable anonymously. Needs ENCRYPTION_KEY +
# SQUARE_* secrets set before deploy. Deploy only after the sandbox is linked.
[functions.square-create-booking]
verify_jwt = true

# square-cancel-booking: cancels on Square + locally. Authenticated stylist only.
[functions.square-cancel-booking]
verify_jwt = true

# Channel webhooks are called by external providers (Meta/WeChat/Twilio/Kakao),
# never by the app — they authenticate via provider signatures (Phase 4), not a
# Supabase JWT. So verify_jwt=false; signature checks are the real gate.
[functions.webhook-instagram]
verify_jwt = false

[functions.webhook-wechat]
verify_jwt = false

[functions.webhook-sms]
verify_jwt = false

[functions.webhook-kakao]
verify_jwt = false

# send-message acts on the stylist's behalf — authenticated session required.
[functions.send-message]
verify_jwt = true

# square-oauth-start: begins the connect flow for the authenticated stylist —
# only a signed-in stylist can link her own Square. Needs SQUARE_APPLICATION_ID.
[functions.square-oauth-start]
verify_jwt = true

# square-oauth-callback: Square redirects the seller's browser here after
# authorize — there is no app JWT on that redirect. The signed state + one-time
# nonce (square_oauth_nonce) are the auth/CSRF guard, so verify_jwt=false.
[functions.square-oauth-callback]
verify_jwt = false

# square-sync: pulls the seller's catalog/team/location after connect. Called
# server-to-server by the callback (service-role auth), so verify_jwt=false; it
# acts only on the stylist_id it's given via their stored Square token.
[functions.square-sync]
verify_jwt = false

# instagram-oauth-start: authenticated stylist begins the Meta connect flow.
[functions.instagram-oauth-start]
verify_jwt = true

# instagram-oauth-callback: Meta redirects the seller's browser here — no app JWT
# on the redirect; signed state + one-time nonce are the auth/CSRF guard.
[functions.instagram-oauth-callback]
verify_jwt = false
